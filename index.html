<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calculator Vamal">
<meta name="theme-color" content="#16283c">
<title>Calculator Taxe Vamale — Trade Flow</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --navy:#16283c;
    --navy2:#24405e;
    --accent:#2f5d8a;
    --bg:#eef1f5;
    --card:#ffffff;
    --text:#1a2330;
    --muted:#6b7686;
    --line:#e3e8ee;
    --green:#1f7a4d;
    --red:#b3372f;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);
    padding-bottom:calc(120px + env(safe-area-inset-bottom));
  }
  /* ---------- APP HEADER ---------- */
  .app-header{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 100%);
    color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 20px 48px;
    border-radius:0 0 28px 28px;
  }
  .app-header .brand{display:flex;align-items:center;gap:12px}
  .app-header .brand img{width:46px;height:auto;background:#fff;border-radius:12px;padding:5px}
  .app-header h1{font-size:1.25rem;font-weight:700;letter-spacing:.01em}
  .app-header p{font-size:.8rem;opacity:.75;margin-top:2px}
  /* ---------- SEGMENTED ---------- */
  .seg-wrap{margin:-30px 16px 0}
  .segmented{
    display:flex;background:var(--card);border-radius:14px;padding:4px;
    box-shadow:0 6px 20px rgba(22,40,60,.12);
  }
  .segmented button{
    flex:1;border:0;background:transparent;padding:12px 6px;border-radius:11px;
    font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;
    font-family:inherit;transition:all .18s;line-height:1.25;
  }
  .segmented button.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(22,40,60,.35)}
  /* ---------- CARDS ---------- */
  .card{
    background:var(--card);border-radius:var(--radius);margin:14px 16px;
    padding:18px 16px;box-shadow:0 2px 10px rgba(22,40,60,.06);
  }
  .card h2{
    font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;
  }
  .card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block}
  .field{margin-bottom:13px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select{
    width:100%;border:1.5px solid var(--line);border-radius:11px;
    padding:12px 13px;font-size:1rem;font-family:inherit;color:var(--text);
    background:#fafbfc;outline:none;transition:border .15s;
  }
  .field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
  .row2{display:flex;gap:10px}
  .row2 .field{flex:1}
  .hint{font-size:.72rem;color:var(--muted);margin-top:5px}
  /* ---------- ARTICLES ---------- */
  .article{
    border:1.5px solid var(--line);border-radius:14px;padding:14px 12px 12px;
    margin-bottom:14px;position:relative;background:#fcfdfe;
  }
  .article-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .article-head .num{
    font-size:.75rem;font-weight:700;color:#fff;background:var(--accent);
    border-radius:8px;padding:3px 10px;
  }
  .btn-del{
    border:0;background:#fdeceb;color:var(--red);font-weight:600;font-size:.75rem;
    border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;
  }
  .art-calc{
    display:flex;justify-content:space-between;gap:6px;
    background:#f0f4f8;border-radius:10px;padding:9px 12px;margin-top:4px;
    font-size:.74rem;color:var(--navy2);flex-wrap:wrap;
  }
  .art-calc b{font-size:.82rem}
  .btn-add{
    width:100%;border:2px dashed #c3ccd7;background:transparent;color:var(--accent);
    font-weight:700;font-size:.9rem;padding:13px;border-radius:13px;cursor:pointer;
    font-family:inherit;
  }
  /* ---------- TOTALS ---------- */
  .totals{background:linear-gradient(160deg,var(--navy),var(--navy2));color:#fff}
  .totals h2{color:rgba(255,255,255,.65)}
  .totals h2 .dot{background:#7fb2e5}
  .tot-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;font-size:.9rem}
  .tot-row span:first-child{opacity:.8}
  .tot-row b{font-size:1.05rem;font-variant-numeric:tabular-nums}
  .tot-row.grand{border-top:1px solid rgba(255,255,255,.25);margin-top:6px;padding-top:12px}
  .tot-row.grand span:first-child{opacity:1;font-weight:700}
  .tot-row.grand b{font-size:1.45rem;color:#9fd0ff}
  .tot-sub{font-size:.72rem;opacity:.6;margin-top:8px}
  /* ---------- PRINT BAR ---------- */
  .print-bar{
    position:fixed;left:0;right:0;bottom:0;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:rgba(238,241,245,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:flex;gap:10px;align-items:center;
  }
  .btn-print{
    flex:1;border:0;background:var(--navy);color:#fff;font-weight:700;font-size:1rem;
    padding:16px;border-radius:15px;cursor:pointer;font-family:inherit;
    box-shadow:0 6px 18px rgba(22,40,60,.35);
  }
  .btn-print:active{transform:scale(.98)}
  .annex-toggle{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:600;color:var(--muted);flex-direction:column}
  .annex-toggle input{width:20px;height:20px;accent-color:var(--navy)}
  /* ================= PRINT DOCUMENT ================= */
  #printDoc{display:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @media print{
    body{background:#fff;padding:0}
    .app-ui{display:none !important}
    #printDoc{display:block}
    @page{size:A4;margin:0}
  }
  .pd-page{
    width:210mm;min-height:296mm;background:#fff;color:#000;
    padding:8mm 14mm 0;position:relative;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;flex-direction:column;
    page-break-after:always;
  }
  .pd-page:last-child{page-break-after:auto}
  .pd-logo{text-align:center}
  .pd-logo img{width:34mm;height:auto}
  .pd-rule{height:0;border-top:3.2mm solid #000;margin:2mm -14mm 0}
  .pd-meta{margin-top:12mm;font-size:10.5pt;line-height:1.75}
  .pd-meta b{font-weight:700}
  .pd-title{
    text-align:center;font-size:20pt;font-weight:800;letter-spacing:.04em;
    margin-top:12mm;font-family:Arial,Helvetica,sans-serif;
  }
  .pd-subtitle{text-align:center;font-size:12.5pt;margin-top:3mm}
  .pd-subtitle .ref{color:#808895;font-style:italic}
  .pd-body{margin-top:14mm;font-size:13pt;font-weight:700;line-height:1.7}
  .pd-body .blk{margin-bottom:7mm}
  .pd-sign{margin-top:10mm;font-size:13pt;font-weight:700;line-height:1.65}
  .pd-footer{
    margin-top:auto;margin-left:-14mm;margin-right:-14mm;
  }
  .pd-footer .pd-rule2{height:0;border-top:3.2mm solid #000}
  .pd-footer .ftxt{text-align:center;font-size:9pt;line-height:1.55;padding:4mm 0 6mm}
  .pd-footer .ftxt b{font-weight:700}
  .pd-footer a{color:#1155cc;text-decoration:underline}
  /* annex table */
  .pd-annex-title{text-align:center;font-size:15pt;font-weight:800;letter-spacing:.03em;margin-top:10mm}
  .pd-annex-sub{text-align:center;font-size:10pt;color:#555;margin-top:2mm}
  table.annex{width:100%;border-collapse:collapse;margin-top:8mm;font-size:9pt}
  table.annex th{
    color:#000;padding:2.6mm 2mm;text-align:left;font-weight:700;
    border-bottom:1.4pt solid #000;border-top:.6pt solid #000;
  }
  table.annex td{border-bottom:.4pt solid #999;padding:2.4mm 2mm;vertical-align:top}
  table.annex td.num,table.annex th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.annex tr.trow td{font-weight:700;border-top:1.2pt solid #000;border-bottom:none}
  .annex-info{margin-top:6mm;font-size:10pt;line-height:1.7}
</style>
</head>

  var TVA_RATE=0.21;
  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var state={mode:"garantie",articles:[]};

  /* ---------- helpers ---------- */
  function num(v){
    if(v==null)return 0;
    v=String(v).trim().replace(/\s+/g,"");
    if(v==="")return 0;
    // accept both comma and dot as decimal separator
    if(v.indexOf(",")>-1 && v.indexOf(".")>-1){
      // whichever comes last is the decimal separator
      if(v.lastIndexOf(",")>v.lastIndexOf(".")) v=v.replace(/\./g,"").replace(",",".");
      else v=v.replace(/,/g,"");
    } else {
      v=v.replace(",",".");
    }
    var n=parseFloat(v);
    return isFinite(n)?n:0;
  }
  function fmt2(n){return n.toLocaleString("ro-RO",{minimumFractionDigits:2,maximumFractionDigits:2});}
  function fmt0(n){return String(Math.round(n));}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function fmtDate(iso){
    if(!iso)return "";
    var p=iso.split("-");
    return p[2]+"-"+MONTHS[parseInt(p[1],10)-1]+"-"+p[0];
  }
  function saveState(){
    try{
      var data={mode:state.mode,catre:el("fCatre").value,ref:el("fRef").value,
        curs:el("fCurs").value,valuta:el("fValuta").value,articles:collectArticles()};
      localStorage.setItem("calcVamal",JSON.stringify(data));
    }catch(e){}
  }
  function el(id){return document.getElementById(id);}

  /* ---------- articles ---------- */
  function articleTemplate(i,a){
    a=a||{};
    return '<div class="article" data-i="'+i+'">'
      +'<div class="article-head"><span class="num">Articol '+(i+1)+'</span>'
      +'<button type="button" class="btn-del" data-del="'+i+'">Șterge</button></div>'
      +'<div class="field"><label>Denumire marfă</label>'
      +'<input type="text" class="a-title" placeholder="ex: Corpi iluminat LED" value="'+esc(a.title||"")+'"></div>'
      +'<div class="row2">'
      +'<div class="field"><label>Cod HS</label>'
      +'<input type="text" class="a-hs" inputmode="numeric" placeholder="ex: 94054039" value="'+esc(a.hs||"")+'"></div>'
      +'<div class="field"><label>Taxă vamală (%)</label>'
      +'<input type="text" class="a-duty" inputmode="decimal" placeholder="ex: 4,7" value="'+esc(a.duty||"")+'"></div>'
      +'</div>'
      +'<div class="row2">'
      +'<div class="field"><label>Valoare unitară</label>'
      +'<input type="text" class="a-unit" inputmode="decimal" placeholder="ex: 125,50" value="'+esc(a.unit||"")+'"></div>'
      +'<div class="field"><label>Nr. bucăți</label>'
      +'<input type="text" class="a-qty" inputmode="decimal" placeholder="ex: 100" value="'+esc(a.qty||"")+'"></div>'
      +'</div>'
      +'<div class="art-calc" data-calc="'+i+'"></div>'
      +'</div>';
  }
  function collectArticles(){
    var out=[];
    document.querySelectorAll("#articles .article").forEach(function(card){
      out.push({
        title:card.querySelector(".a-title").value,
        hs:card.querySelector(".a-hs").value,
        duty:card.querySelector(".a-duty").value,
        unit:card.querySelector(".a-unit").value,
        qty:card.querySelector(".a-qty").value
      });
    });
    return out;
  }
  function renderArticles(list){
    var html="";
    list.forEach(function(a,i){html+=articleTemplate(i,a);});
    el("articles").innerHTML=html;
    recalc();
  }
  function addArticle(){
    var list=collectArticles();
    list.push({});
    renderArticles(list);
  }
  function delArticle(i){
    var list=collectArticles();
    list.splice(i,1);
    if(!list.length)list.push({});
    renderArticles(list);
  }

  /* ---------- calculation ----------
     Rounding rule (per customs practice): duties and TVA are rounded
     PER ARTICLE to whole RON (>=0.50 rounds up), then summed. */
  function compute(){
    var curs=num(el("fCurs").value)||1;
    var rows=[];var totVal=0,totVama=0,totDuty=0,totTva=0;
    collectArticles().forEach(function(a,i){
      var unit=num(a.unit),qty=num(a.qty),dr=num(a.duty);
      var val=unit*qty;                       // value in currency
      var vama=val*curs;                      // customs value RON
      var dutyEx=vama*dr/100;                 // exact duty RON
      var duty=Math.round(dutyEx);            // rounded per article
      var tvaEx=(vama+duty)*TVA_RATE;         // exact TVA RON
      var tva=Math.round(tvaEx);              // rounded per article
      totVal+=val;totVama+=vama;totDuty+=duty;totTva+=tva;
      rows.push({i:i,title:a.title,hs:a.hs,unit:unit,qty:qty,dr:dr,val:val,vama:vama,
        dutyEx:dutyEx,duty:duty,tvaEx:tvaEx,tva:tva});
    });
    return {curs:curs,rows:rows,totVal:totVal,totVama:totVama,
      totDuty:totDuty,tva:totTva,total:totDuty+totTva};
  }
  function recalc(){
    var c=compute();var cur=el("fValuta").value;
    c.rows.forEach(function(r){
      var box=document.querySelector('[data-calc="'+r.i+'"]');
      if(box)box.innerHTML=
        '<span>Valoare<br><b>'+fmt2(r.val)+' '+cur+'</b></span>'
        +'<span>Val. în vamă<br><b>'+fmt2(r.vama)+' RON</b></span>'
        +'<span>Taxă vamală ('+fmt2(r.dutyEx)+')<br><b>'+r.duty+' RON</b></span>'
        +(state.mode==="import"?'<span>TVA 21% ('+fmt2(r.tvaEx)+')<br><b>'+r.tva+' RON</b></span>':'');
    });
    var h;
    if(state.mode==="garantie"){
      h='<div class="tot-row"><span>Valoare în vamă</span><b>'+fmt2(c.totVama)+' RON</b></div>'
       +'<div class="tot-row grand"><span>TAXĂ VAMALĂ</span><b>'+c.totDuty+' RON</b></div>';
    }else{
      h='<div class="tot-row"><span>Valoare în vamă</span><b>'+fmt2(c.totVama)+' RON</b></div>'
       +'<div class="tot-row"><span>Taxe vamale</span><b>'+c.totDuty+' RON</b></div>'
       +'<div class="tot-row"><span>TVA 21%</span><b>'+c.tva+' RON</b></div>'
       +'<div class="tot-row grand"><span>TOTAL DE PLATĂ</span><b>'+c.total+' RON</b></div>';
    }
    el("totalsBody").innerHTML=h;
    saveState();
  }

  /* ---------- print document ---------- */
  function headerHtml(){
    return '<div class="pd-logo"><img src="'+LOGO+'"></div><div class="pd-rule"></div>';
  }
  function footerHtml(){
    return '<div class="pd-footer"><div class="pd-rule2"></div><div class="ftxt">'
      +'<b>TRADE FLOW SRL</b><br>CIF No: RO22428440 - Reg. No. J2007000588510<br>'
      +'E-mail: <a>customs@tradeflow.ro</a> – Phone No. +40 752 034 039</div></div>';
  }
  function metaHtml(subject){
    return '<div class="pd-meta">'
      +'<b>Catre: '+esc(el("fCatre").value||"________________")+'</b><br>'
      +'<b>Data:</b> &nbsp;'+fmtDate(el("fData").value)+'<br>'
      +'<b>Subiect: '+subject+'</b></div>';
  }
  function buildMainPage(c){
    var ref=esc(el("fRef").value||"________________");
    var html='<div class="pd-page">'+headerHtml();
    if(state.mode==="garantie"){
      html+=metaHtml("Calcul deschidere garantie izolata")
        +'<div class="pd-title">DESCHIDERE GARANTIE IZOLATA</div>'
        +'<div class="pd-subtitle">pentru partida de marfă identificată cu <span class="ref">'+ref+'</span></div>'
        +'<div class="pd-body">'
        +'<div class="blk">TAXĂ VAMALĂ = '+c.totDuty+' RON<br>'
        +'CONT IBAN PTR TAXA VAMALĂ: RO57 TREZ 4215 0820 3X00 7967</div>'
        +'<div class="blk">Biroul Vamal Otopeni Călători<br>'
        +'CUI: 4266898 (necesar pe ordinul de plată)- Banca Trezorerie Ilfov<br>'
        +'Trebuie mentionat pe ordinul de plata si "Deschidere Garantie Izolata RO4266898"</div>'
        +'</div>';
    }else{
      html+=metaHtml("Calcul datorie vamala import definitiv")
        +'<div class="pd-title">DATORIE VAMALA DE PLATA</div>'
        +'<div class="pd-subtitle">pentru partida de marfă identificată cu <span class="ref">'+ref+'</span></div>'
        +'<div class="pd-body">'
        +'<div class="blk">TAXE VAMALE = '+c.totDuty+' RON<br>'
        +'CONT IBAN PTR TAXA VAMALĂ: RO14 TREZ 4212 0170 1010 1XXX</div>'
        +'<div class="blk">TVA = '+c.tva+' RON<br>'
        +'CONT IBAN PTR TVA: RO27 TREZ 42120 A 100102XTVA</div>'
        +'<div class="blk">Biroul Vamal Otopeni Călători<br>'
        +'CUI BV 4266898 (necesar pe ordinul de plată)</div>'
        +'</div>';
    }
    html+='<div class="pd-sign">Cu deosebita consideratie,<br>Andrei COTÎRLAN<br>Trade Flow SRL</div>'
      +footerHtml()+'</div>';
    return html;
  }
  function buildAnnexPage(c){
    var cur=esc(el("fValuta").value);
    var imp=state.mode==="import";
    var rows="";
    c.rows.forEach(function(r,ix){
      rows+='<tr><td>'+(ix+1)+'</td><td>'+esc(r.title||"—")+'</td><td>'+esc(r.hs||"—")+'</td>'
        +'<td class="num">'+fmt2(r.unit)+'</td><td class="num">'+fmt2(r.qty)+'</td>'
        +'<td class="num">'+fmt2(r.val)+'</td><td class="num">'+fmt2(r.vama)+'</td>'
        +'<td class="num">'+fmt2(r.dr)+'%</td><td class="num">'+r.duty+'</td>'
        +(imp?'<td class="num">'+r.tva+'</td>':'')+'</tr>';
    });
    rows+='<tr class="trow"><td colspan="5">TOTAL</td>'
      +'<td class="num">'+fmt2(c.totVal)+'</td><td class="num">'+fmt2(c.totVama)+'</td><td></td>'
      +'<td class="num">'+c.totDuty+'</td>'
      +(imp?'<td class="num">'+c.tva+'</td>':'')+'</tr>';
    var info='<div class="annex-info">'
      +'<b>Curs valutar:</b> 1 '+cur+' = '+esc(el("fCurs").value||"1")+' RON<br>'
      +'Taxa vamală'+(imp?' și TVA (21% × (valoare în vamă + taxă vamală))':'')
      +' se rotunjesc la RON întreg pe fiecare articol, apoi se însumează.<br>'
      +'<b>Taxe vamale:</b> '+c.totDuty+' RON';
    if(imp){
      info+='<br><b>TVA:</b> '+c.tva+' RON'
        +'<br><b>TOTAL DE PLATĂ:</b> '+c.totDuty+' + '+c.tva+' = '+c.total+' RON';
    }
    info+='</div>';
    return '<div class="pd-page">'+headerHtml()
      +'<div class="pd-annex-title">ANEXĂ — DETALIU CALCUL</div>'
      +'<div class="pd-annex-sub">'+esc(el("fRef").value||"")+' · '+fmtDate(el("fData").value)+'</div>'
      +'<table class="annex"><thead><tr>'
      +'<th>#</th><th>Denumire marfă</th><th>Cod HS</th>'
      +'<th class="num">Val. unitară ('+cur+')</th><th class="num">Buc.</th>'
      +'<th class="num">Valoare ('+cur+')</th><th class="num">Val. în vamă (RON)</th>'
      +'<th class="num">Taxă %</th><th class="num">Taxă vamală (RON)</th>'
      +(imp?'<th class="num">TVA (RON)</th>':'')
      +'</tr></thead><tbody>'+rows+'</tbody></table>'
      +info+footerHtml()+'</div>';
  }
  function doPrint(){
    var c=compute();
    var html=buildMainPage(c);
    if(el("chkAnnex").checked)html+=buildAnnexPage(c);
    el("printDoc").innerHTML=html;
    setTimeout(function(){window.print();},60);
  }

  /* ---------- events ---------- */
  el("segActivity").addEventListener("click",function(e){
    var b=e.target.closest("button");if(!b)return;
    state.mode=b.dataset.mode;
    this.querySelectorAll("button").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");
    el("hintTva").style.display=state.mode==="import"?"":"none";
    recalc();
  });
  el("btnAdd").addEventListener("click",addArticle);
  el("articles").addEventListener("click",function(e){
    var d=e.target.closest("[data-del]");
    if(d)delArticle(parseInt(d.dataset.del,10));
  });
  document.addEventListener("input",function(e){
    if(e.target.closest(".app-ui"))recalc();
  });
  el("btnPrint").addEventListener("click",doPrint);

  /* ---------- init ---------- */
  var today=new Date();
  el("fData").value=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  var restored=null;
  try{restored=JSON.parse(localStorage.getItem("calcVamal"));}catch(e){}
  if(restored){
    state.mode=restored.mode||"garantie";
    el("fCatre").value=restored.catre||"";
    el("fRef").value=restored.ref||"";
    el("fCurs").value=restored.curs||"";
    el("fValuta").value=restored.valuta||"EUR";
    document.querySelectorAll("#segActivity button").forEach(function(b){
      b.classList.toggle("active",b.dataset.mode===state.mode);
    });
    renderArticles(restored.articles&&restored.articles.length?restored.articles:[{}]);
  }else{
    renderArticles([{}]);
  }
  el("hintTva").style.display=state.mode==="import"?"":"none";
})();
</script>
